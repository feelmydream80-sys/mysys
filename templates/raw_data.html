{% extends "base.html" %}
{% block content %}
<div class="container mx-auto p-4 max-w-screen-xl">
    <!-- 엑셀 템플릿 다운로드 버튼 (실시간 현황용) -->
    <div class="flex justify-end space-x-2 mb-4">
        <button id="downloadExcelTemplateBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-md shadow-sm text-sm transition duration-300 ease-in-out">
            수집 요청서 양식 다운로드
        </button>
    </div>
    <!-- 날짜 선택 카드형 영역 (대시보드 스타일) -->
    <div id="date-selection-card-rawdata" class="collapsible-card bg-white rounded-lg shadow-md mb-6">
        <div class="card-header p-6 cursor-pointer flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-700">날짜 선택</h2>
            <span class="transform transition-transform duration-300">▼</span>
        </div>
        <div class="card-content px-6 pb-6">
            <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4">
                <div class="flex items-center space-x-2 w-full md:flex-1">
                    <label for="start-date" class="text-gray-600 w-16">시작일:</label>
                    <input type="date" id="start-date" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full">
                </div>
                <div class="flex items-center space-x-2 w-full md:flex-1">
                    <label for="end-date" class="text-gray-600 w-16">종료일:</label>
                    <input type="date" id="end-date" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full">
                </div>
                <div class="flex items-center space-x-2 w-full md:w-auto">
                    <label for="job-id-select" class="text-gray-600">Job ID:</label>
                    <select id="job-id-select" class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">전체</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 text-sm text-gray-600">
                실 존재 데이터 기간: <span id="selectedDateDisplay">-</span>
            </div>
        </div>
    </div>
    <!-- 전체 성공률/상태 요약 아래칸 -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-2">
        <div id="total-success-rate" class="text-lg font-semibold text-blue-900 mb-2 md:mb-0"></div>
        <div id="status-summary" class="text-sm text-gray-700 flex justify-end"></div>
    </div>
    <div class="flex justify-end mb-2">
        <button id="excel-download-btn" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded shadow">엑셀 다운로드</button>
    </div>
    <!-- 원천데이터 테이블 -->
    <div id="raw-data-table-card" class="collapsible-card bg-white rounded-lg shadow mb-6">
        <div class="card-header p-6 cursor-pointer flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-700">원천데이터</h2>
            <span class="transform transition-transform duration-300">▼</span>
        </div>
        <div class="card-content p-6 overflow-x-auto">
            <div class="flex justify-between items-center mb-4">
                <span id="raw-data-total-count" class="text-sm font-semibold text-gray-600">총 수량:</span>
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-1">
                        <label for="table-search" class="text-sm text-gray-600">검색:</label>
                        <input type="text" id="table-search" placeholder="Job ID 또는 상태 검색..." class="p-1 border border-gray-300 rounded text-sm w-48">
                    </div>
                    <div class="flex items-center gap-1">
                        <label for="pageSizeSelect" class="text-sm text-gray-600">행 수:</label>
                        <select id="pageSizeSelect" class="p-1 border border-gray-300 rounded text-sm">
                            <option value="10">10개</option>
                            <option value="20">20개</option>
                            <option value="50">50개</option>
                            <option value="100">100개</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="overflow-y-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">수집일자</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">코드명</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">성공/총수량 (%)</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">성공여부</th>
                        </tr>
                    </thead>
                    <tbody id="detail-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- 데이터 행이 여기에 동적으로 삽입됩니다 -->
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="mt-4 flex justify-center"></div>
        </div>
    </div>
</div>
{% block scripts %}
<script src="{{ url_for('static', filename='vendor/js/xlsx.full.min.js') }}"></script>
<script type="module" src="/static/js/pages/raw_data.js"></script>
{% endblock %}
{% endblock %}
