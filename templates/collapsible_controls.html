<!-- 파일명: templates/collapsible_controls.html -->
<!-- 주요 역할: '모두 펼치기'와 '모두 접기' 버튼을 포함하는 재사용 가능한 UI 컴포넌트입니다. -->
<div class="flex justify-end space-x-2 mb-4">
    <button id="downloadExcelTemplateBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-md shadow-sm text-sm transition duration-300 ease-in-out">
        수집 요청서 양식 다운로드
    </button>
    <button id="expandAllBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-md shadow-sm text-sm transition duration-300 ease-in-out">
        모두 펼치기
    </button>
    <button id="downloadRawDataBtn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-md shadow-sm text-sm transition duration-300 ease-in-out">
        원천 데이터 엑셀 다운로드
    </button>
    <button id="collapseAllBtn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-md shadow-sm text-sm transition duration-300 ease-in-out">
        모두 접기
    </button>
</div>
